name: Update GitHub Stats

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update stats timestamp in README
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          sed -i "s/<!-- STATS_LAST_UPDATED:.*-->/<!-- STATS_LAST_UPDATED: $DATE -->/" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh GitHub stats [$(date -u +%Y-%m-%d)]"
          git push
