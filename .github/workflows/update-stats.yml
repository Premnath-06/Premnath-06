name: Update GitHub Stats

on:
  schedule:
    # Runs every 6 hours — keeps stats fresh throughout the day
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Bust stats cache in README
        run: |
          # Generate a timestamp token (YYYYMMDDHH)
          TOKEN=$(date -u +"%Y%m%d%H")

          # Update hidden timestamp comment
          sed -i "s/<!-- STATS_LAST_UPDATED:.*-->/<!-- STATS_LAST_UPDATED: $(date -u +"%Y-%m-%d %H:%M UTC") -->/" README.md

          # Replace the cache-bust token in each stats URL
          # This forces GitHub to treat it as a new image every run
          sed -i "s/&bust=[0-9]*/\&bust=$TOKEN/" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh stats [$(date -u +%Y-%m-%d %H:%M UTC)]"
          git push
